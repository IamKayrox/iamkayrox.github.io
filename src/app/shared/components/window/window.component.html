<div class="window-top-bar" (mousedown)="onMouseDown()" [ngClass]="{ 'moving-window': moving }">
    <div *ngIf="!noButtons"  class="button-container">
        <div class="window-button close"></div>
        <div class="window-button minimise"></div>
    </div>
    <div class="title-container">
        {{title || 'Untitled window'}}
    </div>
    <div class="dummy-thicc"></div>
</div>
<div class="window-content">
    <ng-content></ng-content>
</div>
